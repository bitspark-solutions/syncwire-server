name: syncwire

services:
  postgres:
    image: postgres:16-alpine
    container_name: syncwire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syncwire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syncwire_dev_only_change_me}
      POSTGRES_DB: syncwire
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:${PG_HOST_PORT:-15432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - syncwire-net

  emqx:
    image: emqx/emqx:5.8.9
    container_name: syncwire-emqx
    restart: unless-stopped
    environment:
      # Phase 0 dev user — created on first boot. Phase 2 replaces with JWT.
      EMQX_DASHBOARD__DEFAULT_PASSWORD: syncwire
    ports:
      - "127.0.0.1:${EMQX_MQTT_HOST_PORT:-11883}:1883"   # MQTT (plaintext, internal)
      - "127.0.0.1:${EMQX_WS_HOST_PORT:-18083}:8083"     # MQTT over WebSocket
      - "127.0.0.1:${EMQX_DASHBOARD_HOST_PORT:-18084}:18083" # Dashboard (dev only)
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./deploy/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./deploy/emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - ./deploy/emqx/authn-jwt.conf:/opt/emqx/etc/authn-jwt.conf:ro
    healthcheck:
      test:
        - CMD
        - /opt/emqx/bin/emqx
        - ctl
        - status
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - syncwire-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncwire-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # The in-container port is always 8080 (matches Dockerfile's EXPOSE).
      # The HOST port is ${PORT:-18080}, mapped via the `ports:` line below.
      # Do NOT set PORT here — let the app default to 8080.
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Phase 1+ — uncomment when those modules land
      # DATABASE_URL: postgresql://syncwire:***@postgres:5432/syncwire
      # JWT_SECRET: ${JWT_SECRET}
      # EMQX_URL: mqtt://emqx:1883
    ports:
      - "127.0.0.1:${PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:8080/api/health
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - syncwire-net

networks:
  syncwire-net:
    driver: bridge
    name: syncwire-net

volumes:
  pg_data:
    name: syncwire-pg-data
  emqx_data:
    name: syncwire-emqx-data
  emqx_log:
    name: syncwire-emqx-log
