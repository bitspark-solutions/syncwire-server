## docker-compose.prod.yml
##
## Apply on top of the base file with:
##   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
##
## Tightens the stack for production: restart policies, no dev ports
## (dashboard, debug, host-exposed Postgres), env from a host .env.prod,
## Caddy in front for TLS.

services:
  app:
    restart: always
    env_file:
      - .env.prod
    ports: []  # app is not directly reachable — only via caddy
    # drop the override's debug port
    expose: []
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy

  postgres:
    restart: always
    ports: []  # never expose Postgres to the host in prod
    env_file:
      - .env.prod

  emqx:
    restart: always
    ports:
      - "8883:8883"   # TLS MQTT (Caddy terminates; or direct)
      - "8083:8083"   # WSS — only if Caddy isn't fronting MQTT
    # dashboard NOT exposed in prod
    env_file:
      - .env.prod

  caddy:
    image: caddy:2-alpine
    container_name: syncwire-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - syncwire-net

volumes:
  caddy_data:
    name: syncwire-caddy-data
  caddy_config:
    name: syncwire-caddy-config
