## SyncWire EMQX 5 broker config
##
## Phase 0: minimum config so the stack comes up healthy. Anonymous + allow-all
## (see acl.conf) is the intended Phase 0 posture. Phase 2 replaces this with
## JWT authentication (see authn-jwt.conf) and topic-placeholder ACL rules.

node {
  name = "emqx@127.0.0.1"
  cookie = "syncwire_emqx_cookie_change_me_in_prod"
  data_dir = "/opt/emqx/data"
}

# No `authentication` block on purpose: Phase 0 runs anonymous. The first
# authenticator in the chain becomes the default; if we set
# `mechanism = password_based` with `backend = built_in_database` here, EMQX
# rejects it with `unsupported_mechanism` because built_in_database in 5.8
# supports bcrypt via `salt_rounds` (not `salt_position` as older docs show).
# Setting it up properly is a Phase 2 task, alongside the JWT auth chain.

# ACL chain — Phase 0: allow all. Phase 2: replace with topic-placeholder
# rules from acl.conf.
authorization {
  no_match = "allow"
  deny_action = "disconnect"
  sources = []
}

log {
  file.default {
    enable = true
    level = warning
    formatter = "json"
    path = "/opt/emqx/log/emqx.log"
  }
}
