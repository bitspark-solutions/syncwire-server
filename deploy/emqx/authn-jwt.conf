## SyncWire EMQX JWT authenticator (Phase 2)
##
## Phase 0 ships this file as a no-op (anonymous-only) so the path is in
## place. Phase 2 uncomments the chain and removes the anonymous authenticator
## from emqx.conf. The HS256 secret is shared with the NestJS app (env var
## JWT_SECRET) so the broker can validate tokens minted by /api/auth/login.
